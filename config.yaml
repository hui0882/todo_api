# TODO API 配置文件模板
# 请根据您的实际环境修改以下配置

# 服务器配置
server:
  # 服务端口号，默认8080
  port: 8080

# 数据库配置 (MySQL)
database:
  # 数据库主机地址
  host: localhost
  # 数据库端口号，默认3306
  port: 3306
  # 数据库用户名
  username: root
  # 数据库密码
  password: 12345678
  # 数据库名称
  dbname: todo_list_api
  # 字符集，默认utf8mb4
  charset: utf8mb4
  # 是否解析时间，建议true
  parse_time: true
  # 时区设置，建议Local
  loc: Local
  # 最大空闲连接数
  max_idle_conns: 10
  # 最大打开连接数
  max_open_conns: 100
  # 连接最大生命周期（秒）
  conn_max_lifetime: 3600

# Redis配置
redis:
  # Redis主机地址
  host: localhost
  # Redis端口号，默认6379
  port: 6379
  # Redis密码，如果没有密码留空
  password: ""
  # Redis数据库编号，默认0
  db: 0
  # 连接池大小
  pool_size: 10
  # 会话前缀
  session_prefix: "todo_session:"
  # 会话最大生存时间（秒）
  session_max_age: 86400