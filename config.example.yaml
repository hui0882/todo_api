# TODO API 配置文件示例
# 复制此文件为 config.yaml 并根据实际环境修改配置

# 服务器配置
server:
  # 服务端口号
  port: 8080

# MySQL 数据库配置
database:
  # 数据库主机地址
  host: localhost
  # 数据库端口号
  port: 3306
  # 数据库用户名
  username: root
  # 数据库密码 (请修改为实际密码)
  password: your_password_here
  # 数据库名称
  dbname: todo_list_api
  # 字符集
  charset: utf8mb4
  # 是否解析时间
  parse_time: true
  # 时区设置
  loc: Local
  # 最大空闲连接数
  max_idle_conns: 10
  # 最大打开连接数
  max_open_conns: 100
  # 连接最大生命周期（秒）
  conn_max_lifetime: 3600

# Redis 配置
redis:
  # Redis 主机地址
  host: localhost
  # Redis 端口号
  port: 6379
  # Redis 密码 (如无密码留空)
  password: ""
  # Redis 数据库编号
  db: 0
  # 连接池大小
  pool_size: 10
  # Session 键前缀
  session_prefix: "todo_session:"
  # Session 有效期（秒）24小时 = 86400秒
  session_max_age: 86400
